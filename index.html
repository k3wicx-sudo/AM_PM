<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Your 60-Second Skin Routine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,500;0,700;0,900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#101A33;
    --paper:#FFF8EC;
    --am-sky-1:#FFD466; --am-sky-2:#FFB020; --am-accent:#FF6A2B;
    --pm-sky-1:#1B2A5E; --pm-sky-2:#0E1533; --pm-accent:#8FB0FF;
    --white:#FFFFFF;
    --good:#2FA36B;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(170deg,var(--am-sky-1),var(--am-sky-2));
    transition:background 1.2s ease;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    user-select:none;-webkit-user-select:none;
  }
  body.pm{background:linear-gradient(170deg,var(--pm-sky-1),var(--pm-sky-2));color:var(--white)}

  .stage{
    width:min(430px,100vw);
    height:min(100dvh,900px);
    display:flex;flex-direction:column;
    padding:max(16px,env(safe-area-inset-top)) 20px max(16px,env(safe-area-inset-bottom));
    position:relative;
  }

  /* ---------- top bar: dial + phase label ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .phase{
    font-family:'Archivo',sans-serif;font-weight:900;
    font-size:clamp(20px,5.5vw,26px);letter-spacing:.04em;text-transform:uppercase;
    line-height:1;
  }
  .phase small{
    display:block;font-family:'Space Grotesk';font-weight:500;
    font-size:12px;letter-spacing:.14em;opacity:.75;margin-top:5px;text-transform:uppercase;
  }
  .dial{position:relative;width:76px;height:76px;flex:none}
  .dial svg{width:100%;height:100%;transform:rotate(-90deg)}
  .dial .track{fill:none;stroke:rgba(0,0,0,.15);stroke-width:6}
  body.pm .dial .track{stroke:rgba(255,255,255,.18)}
  .dial .prog{fill:none;stroke:var(--ink);stroke-width:6;stroke-linecap:round;transition:stroke .8s}
  body.pm .dial .prog{stroke:var(--pm-accent)}
  .dial .orb{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:30px;line-height:1;transition:transform .6s;
  }
  .clock{
    position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);
    font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap;
  }
  body.pm .clock{background:var(--pm-accent);color:var(--pm-sky-2)}

  /* ---------- step dots ---------- */
  .dots{display:flex;gap:6px;margin:18px 0 0}
  .dots i{height:5px;flex:1;border-radius:99px;background:rgba(0,0,0,.16);transition:background .3s}
  body.pm .dots i{background:rgba(255,255,255,.2)}
  .dots i.done{background:var(--ink)}
  body.pm .dots i.done{background:var(--pm-accent)}

  /* ---------- card ---------- */
  .card{
    flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;gap:14px;padding:12px 0;min-height:0;
  }
  .stepnum{
    font-family:'Archivo';font-weight:700;font-size:13px;letter-spacing:.22em;
    text-transform:uppercase;opacity:.7;
  }
  .icon{
    width:clamp(120px,36vw,170px);height:clamp(120px,36vw,170px);
    background:var(--white);border-radius:32px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 30px rgba(16,26,51,.18);
    color:var(--ink);
  }
  body.pm .icon{box-shadow:0 10px 30px rgba(0,0,0,.45)}
  .icon svg{width:62%;height:62%}
  .icon img{width:82%;height:82%;object-fit:contain;border-radius:20px}
  .title{
    font-family:'Archivo';font-weight:900;
    font-size:clamp(26px,7.4vw,36px);line-height:1.06;letter-spacing:-.01em;
    max-width:22ch;
  }
  .how{
    font-size:clamp(15px,4.2vw,17px);font-weight:500;line-height:1.35;
    max-width:26ch;opacity:.92;
  }
  .amount{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--ink);color:var(--paper);
    font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;
    padding:8px 16px;border-radius:99px;
  }
  body.pm .amount{background:var(--pm-accent);color:var(--pm-sky-2)}
  .amount:empty{display:none}

  /* ---------- controls ---------- */
  .controls{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .hint{font-size:12px;opacity:.65;letter-spacing:.08em;text-transform:uppercase;font-weight:500}
  .btnrow{display:flex;gap:8px}
  button{
    font-family:'Space Grotesk';font-weight:700;font-size:14px;
    border:2px solid currentColor;background:transparent;color:inherit;
    border-radius:99px;padding:9px 16px;cursor:pointer;
  }
  button.primary{background:var(--ink);border-color:var(--ink);color:var(--paper)}
  body.pm button.primary{background:var(--pm-accent);border-color:var(--pm-accent);color:var(--pm-sky-2)}

  /* ---------- animations ---------- */
  .card > *{animation:pop .45s cubic-bezier(.2,.9,.3,1.2) both}
  .card > *:nth-child(2){animation-delay:.05s}
  .card > *:nth-child(3){animation-delay:.1s}
  .card > *:nth-child(4){animation-delay:.15s}
  .card > *:nth-child(5){animation-delay:.2s}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    .card > *{animation:none}
    body{transition:none}
  }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="topbar">
    <div class="phase" id="phaseLabel">Ready?<small id="phaseSub">60-second routine demo</small></div>
    <div class="dial">

      <div class="orb" id="orb">☀️</div>
      <div class="clock" id="clock">0:60</div>
    </div>
  </div>

  <div class="dots" id="dots"></div>

  <div class="card" id="card"></div>

  <div class="controls">
    <span class="hint" id="hint">Tap card to pause</span>
    <div class="btnrow">
      <button id="back" aria-label="Previous step">‹ Back</button>
      <button id="next" class="primary" aria-label="Next step">Skip ›</button>
    </div>
  </div>
</div>

/* ---------------- timeline: ~60s total ---------------- */
const steps = [
  {phase:"intro", dur:3.5, icon:I.check, img:"iphonetimer", num:"Every single day",
   title:"Your 5-minute routine", how:"Morning + night. Set a timer and go.", amount:""},

  // -------- AM --------
  {phase:"am", n:1, dur:4.5, icon:I.wash, img:"panoxyl", num:"Morning \u00b7 Step 1",
   title:"PanOxyl Gel Wash", how:"Massage on. Set a 2-minute timer. Let it sit.", amount:"\u23f1 2 min on skin"},
  {phase:"am", dur:3.5, icon:I.timer, img:"toothpaste", num:"Morning \u00b7 While you wait",
   title:"Brush your teeth", how:"Just enough time to brush your teeth. Timer buzzes? Rinse well.", amount:"\u23f1 2 min"},
  {phase:"am", n:2, dur:4, icon:I.drops, img:"ordinary", num:"Morning \u00b7 Step 2",
   title:"The Ordinary Niacinamide", how:"Spread over your whole face.", amount:"2\u20133 drops"},
  {phase:"am", n:3, dur:4.5, icon:I.dab, img:"neutrogena", num:"Morning \u00b7 Step 3",
   title:"Neutrogena Stubborn Acne", how:"Thin layer on breakout zones. Skip eyes, lips, nostrils.", amount:"Thin layer"},
  {phase:"am", n:4, dur:4, icon:I.lotion, img:"lubriderm", num:"Morning \u00b7 Step 4",
   title:"Lubriderm", how:"Light layer everywhere. Locks in moisture.", amount:"Dime size"},

  // -------- PM --------
  {phase:"pm", n:1, dur:4.5, icon:I.moonwash, img:"cetaphil", num:"Night \u00b7 Step 1",
   title:"Cetaphil cleanser", how:"Wash the whole day off. Rinse well.", amount:""},
  {phase:"pm", n:2, dur:4, icon:I.towel, img:"papertowel", num:"Night \u00b7 Step 2",
   title:"Pat dry", how:"Clean paper towel. Pat \u2014 don't rub.", amount:""},
  {phase:"pm", n:3, dur:4, icon:I.lotion, img:"lubriderm", num:"Night \u00b7 Step 3",
   title:"Lubriderm first", how:"Thin layer over your whole face.", amount:"Thin layer"},
  {phase:"pm", dur:4.5, icon:I.game, img:"gamer", num:"Night \u00b7 In between",
   title:"Wait 5\u201310 minutes", how:"Until skin is fully dry. Squeeze in a quick game.", amount:"\u23f1 5\u201310 min"},
  {phase:"pm", n:4, dur:5.5, icon:I.pea, img:"differin", num:"Night \u00b7 Step 4",
   title:"Differin gel", how:"One pea covers your whole face. Skip eyelids, lips, nose corners.", amount:"Pea size"},
  {phase:"pm", dur:4.5, icon:I.wait, img:"dragon", num:"Night \u00b7 In between",
   title:"Wait 10\u201315 minutes", how:"Let Differin absorb. Brush your teeth \u2014 or go feed the dragon.", amount:"\u23f1 10\u201315 min"},
  {phase:"pm", n:5, dur:4, icon:I.lotion, img:"lubriderm", num:"Night \u00b7 Step 5",
   title:"Feeling dry?", how:"One more light layer of Lubriderm seals in moisture.", amount:"Optional"},

  {phase:"outro", dur:5, icon:I.party, num:"You did it! \ud83c\udf8a",
   title:"Consistency wins", how:"Dry or flaky at first? Normal \u2014 add Lubriderm at night. Red or burning? Tell me so we can adjust.", amount:"See you tomorrow"}
];

const TOTAL = steps.reduce((s,x)=>s+x.dur,0);
const RING_LEN = 213.6;

const card=document.getElementById('card'), ring=document.getElementById('ring'),
      orb=document.getElementById('orb'), clock=document.getElementById('clock'),
      dots=document.getElementById('dots'), phaseLabel=document.getElementById('phaseLabel'),
      hint=document.getElementById('hint');

steps.forEach(()=>dots.appendChild(document.createElement('i')));

const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
let idx=0, elapsedBefore=0, stepStart=null, paused=reduceMotion, raf=null;

function phaseText(p){
  if(p==="am") return ["Morning","De-clog · Protect · Control oil","☀️"];
  if(p==="pm") return ["Night","Cleanse · Protect · Treat · Repair","🌙"];
  if(p==="outro") return ["Done","Repeat daily","✅"];
  return ["Ready?","60-second routine demo","☀️"];
}

function render(){
  const s=steps[idx];
  document.body.classList.toggle('pm', s.phase==="pm" || s.phase==="outro");
  const [big,small,emoji]=phaseText(s.phase);
  phaseLabel.innerHTML = big + '<small>'+small+'</small>';
  orb.textContent = emoji;
  card.innerHTML =
    '<div class="stepnum">'+s.num+'</div>'+
    '<div class="icon">'+(s.img?('<img src="'+IMG[s.img]+'" alt="">'):s.icon)+'</div>'+
    '<div class="title">'+s.title+'</div>'+
    '<div class="how">'+s.how+'</div>'+
    '<div class="amount">'+s.amount+'</div>';
  [...dots.children].forEach((d,i)=>d.classList.toggle('done', i<=idx));
  hint.textContent = paused ? "Paused — tap card to play" : "Tap card to pause";
}

function tick(t){
  if(paused){raf=requestAnimationFrame(tick);return}
  if(stepStart===null) stepStart=t;
  const inStep=(t-stepStart)/1000;
  const elapsed=Math.min(TOTAL, elapsedBefore+inStep);
  ring.style.strokeDashoffset = RING_LEN*(1-elapsed/TOTAL);
  clock.textContent = "0:"+String(Math.max(0,Math.ceil(TOTAL-elapsed))).padStart(2,"0");
  if(inStep>=steps[idx].dur){
    if(idx<steps.length-1){ goTo(idx+1,t); }
    else { paused=true; hint.textContent="Tap Replay to watch again"; document.getElementById('next').textContent="Replay ↺"; }
  }
  raf=requestAnimationFrame(tick);
}

function goTo(i,t){
  elapsedBefore=steps.slice(0,i).reduce((s,x)=>s+x.dur,0);
  idx=i; stepStart=(t!==undefined)?t:null;
  if(t===undefined){ stepStart=performance.now(); }
  render();
}

card.addEventListener('click',()=>{ 
  if(idx===steps.length-1 && paused && clock.textContent==="0:00"){ return; }
  paused=!paused;
  if(!paused){ stepStart=performance.now(); elapsedBefore=steps.slice(0,idx).reduce((s,x)=>s+x.dur,0); }
  render();
});
document.getElementById('next').addEventListener('click',e=>{
  e.stopPropagation();
  if(idx===steps.length-1){ // replay
    document.getElementById('next').textContent="Skip ›";
    paused=reduceMotion; goTo(0);
    clock.textContent="0:"+String(Math.ceil(TOTAL)).padStart(2,"0");
    ring.style.strokeDashoffset=RING_LEN;
    return;
  }
  goTo(idx+1);
});
document.getElementById('back').addEventListener('click',e=>{
  e.stopPropagation();
  goTo(Math.max(0,idx-1));
});

render();
clock.textContent="0:"+String(Math.ceil(TOTAL)).padStart(2,"0");
if(reduceMotion){ hint.textContent="Tap card to play"; }
raf=requestAnimationFrame(tick);
</script>
